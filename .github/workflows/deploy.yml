name: Deploy to GitHub Pages

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (optional)
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          keep_files: false

  configure-pages:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Configure GitHub Pages to serve from gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          owner=${GITHUB_REPOSITORY%/*}
          repo=${GITHUB_REPOSITORY#*/}
          echo "Configuring Pages for $owner/$repo to use gh-pages branch..."
          curl -sS -X PUT -H "Authorization: token $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" https://api.github.com/repos/$owner/$repo/pages -d '{"source":{"branch":"gh-pages","path":"/"}}'

      - name: Wait for Pages build (poll status)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          owner=${GITHUB_REPOSITORY%/*}
          repo=${GITHUB_REPOSITORY#*/}
          echo "Waiting for Pages build to complete for $owner/$repo..."
          for i in {1..30}; do
            status=$(curl -s -H "Authorization: token $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" https://api.github.com/repos/$owner/$repo/pages | python -c "import sys,json; print(json.load(sys.stdin).get('status'))")
            echo "Status: $status (attempt $i)"
            if [ "$status" = "built" ] || [ "$status" = "built_with_warnings" ]; then
              echo "Pages built successfully.";
              exit 0
            fi
            sleep 5
          done
          echo "Timed out waiting for Pages build." >&2
          exit 1
